# Supabase CLI (https://supabase.com/docs/guides/cli)
# Run `supabase link` in this repo, then deploy functions.

# Auth "Send Email" hook calls this function server-to-server (signed webhook).
[functions.send-auth-email]
verify_jwt = false

# Forgot password: browser invokes with anon key; uses service role + Resend only.
[functions.send-password-reset]
verify_jwt = false

# Signed-in user starts Stripe Checkout for one-time license (JWT verified by gateway).
[functions.create-checkout-session]
verify_jwt = true

# After Checkout redirect: verify session with Stripe and grant license (JWT).
[functions.confirm-checkout-session]
verify_jwt = true

# Signed-in user permanently deletes account + cloud data (JWT verified by gateway).
[functions.delete-account]
verify_jwt = true

# Stripe → grant license (raw body + signature; no JWT).
[functions.stripe-webhook]
verify_jwt = false

# Admin dashboard: stats, customer list, refunds (JWT + ADMIN_EMAILS allowlist).
[functions.admin-api]
verify_jwt = true
